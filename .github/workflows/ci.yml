name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Every relative link and image must point at a file that exists.
      # The repo holds itself to the same standard it asks of research claims.
      - name: Check internal links and assets
        shell: pwsh
        run: ./scripts/check-internal-links.ps1
