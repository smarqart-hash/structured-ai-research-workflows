name: Discourse sources

# External link-rot monitor for the discourse source log. Runs on a schedule and
# on demand, NOT on every push: external sources are outside the repo's control,
# so a broken upstream link should raise a signal, not block unrelated work.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  check-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check discourse source URLs
        shell: pwsh
        run: ./scripts/check-discourse-sources.ps1
